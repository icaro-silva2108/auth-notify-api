spring:
  application:
    name: login-system

  datasource:
    url: jdbc:h2:mem:test-db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: "health,info"

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000